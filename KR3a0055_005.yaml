body:
  text: 邇言卷五宋劉炎撰天道三家之市賢否雜處十室之邑善惡相半天必佑賢黜不肖福善禍淫人則雷霆之威日轟轟乎三家雨露之恩日優渥乎十室足矣胡足見造化之大哉為善不必福福在其中為惡不必禍禍在其中是天道也積善順天不求其福可也積惡而求免禍其可乎施德於人不求其報可也施怨而責人無報其可乎是故君子善與天合德與人和必其所可必而不必其所不可必也為惡而不為惡所傾惡亦足為矣為善而不為善所成善亦不足為矣惡而終傾善而終成君子必舍彼而取此仁則生生則久久則廣大不仁則賊賊則削削則枯滅義則成成則積積則充實不義則敗敗則散散則耗蕩是故聖賢仁生如春義成如秋進德入道無有止極積利干祿宜懼滿盈道德不器利祿有量也或問分有定人鮮能安者何也曰心平則安不平則不安不安則傾欹顛覆隨之雖欲復常已噬臍矣是故自然之分天命也樂天不憂知命者也夀夭有數貴賤有分天也君子為其所可為不為其所不可為斯可以勝天言數者以富貴安佚為福以貧賤憂戚為禍人之賢否心之邪正不與焉是豈知君子有自求之福小人有自取之禍哉故曰靜重之福輕躁之禍匪降自天自取由人臣弒其君則子弒其父祿山之後則有慶緒人曰天也我曰人也忠於君所以教其子之孝順於長所以教其弟之悌孝悌之道性根於天迭相視效習成於人人而反是道自禍也禍福自已天何心哉愚民能移其奉神之心於嚴父移其佞佛之心於慈母則神明參乎其前矣舍明徇幽此其所以為愚也鑽蕉瀝漆見者心惻伐元蠧真不知自憐愚孰甚焉故凡不愛其身而疾痛呼天者愚民也麝裂臍狨犛斷尾惡其為身害也人有為身害者多矣反若被珠玉錦繡然斯惑之甚也髮如素絲體如枯枝耳目聰明方寸不亂夀而臧矣如其不臧則盜跖不如顔回人皆曰跖夀而回夭吾獨曰回夀而跖夭跖未死而先朽回既死而不朽也疾非暴疾必待其定定而後應應必宜矣事非機事姑鎮以靜靜而後動動斯得矣聖人緩急適宜剛柔適時常人急則多敗緩則失機剛則易折柔則易屈君子與其剛也寧柔與其急也寧緩或曰聖人何以知性命之理曰格物則知性更事則知命或曰何以知事物之要曰聖人察天地之運知鬼神之情而況於人乎而況於事物乎是故易之為道通天下之變故者也春秋之義逹天下之情僞者也由邇而逺自明而幽天地鬼神且不能違而況於人乎而況於事物乎性地虛明曠如青天心曲隂墨隘如坎窞是故惡莫大於隂謀善莫先於隂德知斯謀足以自陷則知斯德足以自裕或曰順天之道何先曰自下謙無凶爻訟無終吉聖人作易之意亦可知矣邇言卷五

body:
  text: 邇言卷一宋劉炎撰成性中天地而立與天地參者人也天命以人不物之矣天不物之而自待以物始也人終去禽犢不逺矣然則人之性實天地之性也孔子以為貴孟子以為善天地豫人之正也荀卿謂之惡主血氣言之也揚雄謂之混雜人與物言之也韓愈品分之是復以清濁之氣髙下之質言之也荀揚韓之言性皆非天地豫人之正也君子保天命之性之謂仁成天性之仁莫如學投珠於礫擲璧於石腐夫過之毛髮灑淅至貴之性溷於汚濘不訾之身行險駸駸人之見之未必寒心知貴物而不知貴於物也君子尊良貴之性則養之以中和寶不訾之身則安之以分義外物之貴不足貴矣希夷子曰凡人賤者不可使貴亦猶貴者不賤命也炎則曰能有其貴則賤者可使貴不能有其貴則貴者可使賤性也君子安居道德之宇出入禮樂之門馳騁仁義之途言性不言命或問形色天性何如炎曰天命以人而不物之即天性也惟聖人為能踐形爾不能踐形者其形人其性禽滔滔天下皆是也一氣均播有土皆生芳蘭惡蕕其臭不同參术烏喙其味不同質以氣生氣隨質變也元氣豫物未嘗不同物之氣質隨取自異天之豫人人之自異也亦然是故氣有清濁則識有通塞質有厚薄則行有澆淳才之小大情之邪正血氣之動靜皆非天命之正性也麟異於凡獸鳯異於凡禽者仁也聖賢君子異於凡人亦仁也禽獸不仁人知惡之人而不仁不知自惡惑之甚也仁者有不動動則仁矣不仁者有不為為則不仁矣發於其心有觸斯應故仁者不必好所好而後仁不仁者不必惡所惡而後不仁君子為仁者所好以為知己可也為仁者所惡無勞懷不平之心然則不仁亦天性歟曰天非使之不仁人自不仁爾天下之至堅頑者莫如石潤而雨燥而暘噓而水生擊而火出藏金而韞玉戴土而滋木五行之質具焉為磬其聲清越為砮其鋒堅利積壘為防刻斫為器金需以礪玉需以治五行之用具焉五行周流天地間隨取皆足禀其精英者謂之人豈以人而不如石乎人而不如石不學之過也道德仁義雖愚夫不學而知及其至也聖人猶病焉法度器數雖聖人學而後知及其至也愚夫可以與能焉是以君子之學逹道而據德依仁而由義其於藝也游之而巳君子之所樂者三樂為天地間正人樂為正人端士之裔樂乎知古知今與凡民異怪羊知肥燕石知飛生靈動植莫不知時樂天之命則聖賢之所知也或問聖人罕言性子何言之多耶炎曰論語六經皆成性之學也聖人不茍言之亦允蹈之而已邇言卷一

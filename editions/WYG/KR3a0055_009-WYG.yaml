body:
  text: 邇言卷九宋劉炎撰今昔或問昔者帝王所以公天下之意曰堯以天下授一民臣民無間言舜以天下授一臣臣民亦無間言順天下非强天下也茍或强之父子猶有爭况天下乎三王之未王也已為羣臣諸侯之長三王之既王矣羣臣諸侯世有其國三王亦止為之長爾憂天下非私天下也茍或私之簞食豆羮且不可況天下乎或曰三代忠質文之政猶不能無弊何以責後世曰斯弊也加一轉移之力則善矣後世弊政若腐木壊器者不可復為其有可為者必有得於三代之意也或曰周典聖人之善制何不可行於後世曰周之諸侯各治其國而周公獨提綱於王畿劉歆王介甫欲以一人之力施之天下則礙矣况立法本意與周異耶或問夫子之教異於釋老者安在曰聖人心正而天下平釋老之心虚寂而已虚寂則可以己不可以人也人在天地間身為重父父子子而後有此身君君臣臣而後安此身釋老之教内不知有父子外不知有君臣而曰乃身可以佛而極樂可以僊而長生吾不信也豈知聖賢内樂以道養生以仁始乎事親終乎事君近而正身逺而及物此身樂且不息矣老莊陋至治而嘉洪荒然則衣冠不如氈罽稻粱不如湩酪乎或曰墨氏貴儉養老選士大射宗祀嚴父堯舜之治如斯而已何以見擯於孟氏之門曰聖賢所貴者常行之道也墨氏儉不適禮愛不别親差之杪忽其謬霄壤也或問從衡之言孰當曰衡則失之從亦未為得也季子說六國以合從止夸大其土地之廣谿山之險甲兵之强資用之富而已天時人和行攻坐守締交約好之本末未之或知也能自治其國厚其民相軻而將頗斯亦足矣何必聽從衡之言事秦且攻秦哉或問樂毅伐齊所不下者兩城果有心於王道歟曰斯師也復讎之師也昔者齊人伐燕不能置君而去之故燕叛之今也燕能伐齊不能置君而去之齊亦叛以燕伐燕以齊伐齊先後一轍何王道之有王通之言過矣孟氏之云不亦正乎或問頗牧之為將曰大將也靜而後應不為禍始漢以來趙營平諸葛武侯足以齊之爾皆先自治不急治人者也戰國君愚臣智及其終也臣亦自愚嬴秦君尊臣卑及其終也君亦自卑或問漢祖功歸三傑陳平何獨不與曰起沛入秦遷蜀復有關中蕭張韓之宣力已多凡五年始得陳平於修武躡足隨良未足多也惡具間楚楚庸則受之耳汜陽正位歸功三傑平胡得與是後解圍釋急誅吕安劉平功足以繼三傑矣或問叔孫兩生之是非曰月餘綿蕞何以復古必待百年曷禦擊柱叔孫則非兩生亦未為得也漢去三代未逺必也復古易於反掌兩生胡不為是來歟或曰髙祖以大度剏業光武以明智中興假使冦鄧居前未必能辦髙祖之事韓彭後出亦未必為光武用也髙光優劣亦可知矣曰是特羯胡之言爾吾聞之老先生曰光武材過諸將而氣以柔之髙祖材不及諸將而氣以盖之韓彭亦輕視髙祖而然爾使遇光武殆未必爾斯言得之矣髙光未易遽優劣也為民之志同御將之方異也或問文宣之治孰優曰文宣同於䘏民而異於馭臣文帝馭臣寛而有制宣帝馭臣嚴而少恩或問武宣之治孰優曰武帝所為去秦皇不逺末年多悔禍之心宣帝所為去周宣不逺末年多兆禍之事宣帝茍不爾不特優於武帝而已也或問漢唐孰能用諫曰漢祖實副其名唐宗名過其實名實隠然莫如文帝終身受言得之賈山終身務農得之賈誼終身重穀得之晁錯體貎大臣之說用困鄧通而重丞相不止禮一周勃也推轂遣將之說行屈帝尊而信亞夫不止赦一魏尚也聽言用諌之道惟文帝得之其餘則忽聽暫行而止也或問妖言令漢世屢除而復存何也曰是令不存於簡書而嘗著於䜛人之口也始作俑者其無後乎真秦人之謂也或問文帝除收孥而盗玉杯者族得不謂之過刑歟曰懲人罔已之罪示己欺天之過也方士幻詐武帝覺而不誅有愧文帝之為矣或問文帝廣仁愛之道何以廢天下通䘮曰其有監於平勃之事乎帝自代來夜拜私人行殿中領南北軍不三月而建太子防閑周宻未害也其終也不欲百官聽于冡宰遂廢天下通䘮雖有辯者不能為之辭矣或問孝文何不盡用賈生之言曰正始之道宜改正朔欲興禮樂太欲速矣暨帝中年方有心於王制而誼已夭終漢制之不古者天也或問文帝决獄錢榖之問何如曰庶富之基措刑之本也或問漢世制禦夷狄之方文帝為得武帝為失曰待以柔道在文帝時猶可在武帝時則不可匈奴怙强盛甚矣建元以來大入冦邊凡十六七帝大出兵亦十五六自王恢馬邑之後大抵彼先發此應之非師出無名也惜乎窮追反弊中國耳或曰賈生言治皆切於當世何表餌之䟽耶曰仁義信表也以中國之物而壊匈奴耳目口腹者餌也三表固出於常而五餌正與中行說之言反遽斥以䟽可乎所患雜出於術而不純於道爾或問先漢任相之道曰不數易足為後世法任而盡其材蕭曹丙魏而已或問周漢任子之制曰先之以教養申之以保任父師之責也師不能教之於始父兄不能保其終是制也後世流為恩賞之格矣或問漢世集議何如曰始於髙祖之好謀成於孝文之能行雖其餘得失相半然是道也終不失古人之美意或問兩漢報功之典曰雲臺優於麒麟麒麟優於白馬或問京房考課之法曰蕭劉以直道攻恭顯然且不免房以瞽史之術占盗竊之私言雖有中豈不速小人之禍也哉或問貢禹韋匡郊廟之議曰三子者議此則堅執不移及建太策漠然不對因循成風卒厄漢祚儒生遇主足以為鑒矣漢儒因循漢法猶秦也任者一節不謹大者族次者戮下者獄是故儒多遜頑多觸宜其始也錯中也𢎞終也韋匡甚而至於孔張也孔張之計得矣其如朱雲之玷何舒向出處足為漢儒標凖矣或問漢置三公官何如曰權在王氏不必論其官之備不備名之正不正也或問光武明章之盛由反西都之為也及其弊也復出於意料之所不及者何耶曰反之過乎中也或問節誼之士如之何而黨錮曰自取之也君子百是必有一非小人百非必有一是天下士至不少矣豈必登龍門仙舟者皆賢不在此選者皆不肖耶更相題表自立禍的者也人豈能禍之哉或曰孔明曷自比於管樂曰亮有志於興漢也昭王全破燕威公治亂齊管樂之力也亮佐先主續亡漢如其志矣彼曷不自比於方召寇鄧哉曰亮起隆中吴魏各有其國十五六年矣勢同列國烏得與周漢比顧廬對談大畧著白矣然則三國之君孰優曰亮氣節籌畧過荀賈瑜肅逺甚初平之初亮即輔劉則孫曹負矣其君優劣不必論也或問赤壁淝水之役曰是役也可為東南備禦之法長淮大江利在逆戰害在退守盖敵在境土彼心未固敵入門墻我心易揺也公瑾㓜度知此遂勝惜天不假之年爾或問魏晉清談之弊曰黨錮之遺也融衡以孔顔自况颺晏以四聰八逹更為品目天下之人皆若狂宜其敗國亡家也或問六朝何以不能復中原曰強弱變故適相當天意也况其人間事之未至耶盖嘗為六朝兵樞矣更僕未易悉數也或問營平武侯屯田之法曰後世養兵之良法也營平春作不及秋成武侯經畫實為乆計天必祐漢亮之渭南即蕭何之關中也或問均田口分世業之制曰富連阡陌貧無立錐茍或均之不猶愈於不均乎惜乎不保其往爾或問府兵起於西魏而備於唐備而復壊者何也曰口分世業租調府兵其原一也賦法兵制亦從而轉移者由世業之不存也或問唐藩鎮之弊曰太宗務廣地諸邉都䕶即藩鎮也不必府兵壞而後藩鎮也或問天䇿𢎞文之置曰疑似之際有天䇿以收勇士有𢎞文以收謀士宜乎隱巢之死也漢儲博望且猶不可况居嫌隙之地哉或問太宗漸不克終得非自夸仁義之既效歟曰自夸則有之然不若斯言之甚也舊史止謂之偃武修文新史則曰勸行仁義爾或曰太宗腹心房杜藥石王魏君臣相得近古未有也然於徴也生則如友死則如讎何也曰太宗有過惟徴極言之極言則易踈勢使然也太宗尚讎徴於既死若德宗則讎贄於猶生或問近世之治惟太宗為盛變故迭興亦未有如唐者何也曰太宗備君人之能故其治舉太宗不純乎君人之道故其弊端易滋也或曰姚宋韓張𤣥宗之所重及其相也或四三年或七八月而止爾李林甫楊國忠𤣥宗之所輕也迭居相位或終其身或十九年者何也曰非其始明終暗也佚於小人之佞諛勞於君子之規正也或問唐世宗宦官之禍曰猛將若可忌閹寺若易制曾不知兵權舍此而就彼則非復門户掃除之𨽻也或曰不仁未有能得天下者朱梁新莽何以暫有天命少留人心哉曰天為民置君非為莽温也人知一心以尊天子非尊莽温也四時不可一日無陽則天下不可一日無君茍其人暫可以長雄天必置之迨其惡稔天命人心始去之耳天命人心旣然然則嬴秦曹魏上承周漢之正朔史氏烏得而遽絶之乎尊其正朔之相承者所以貴一統之義也或問得以不仁守之以仁可乎曰殺奪人於貨者猶不可文之以禮義而况於天下乎以是得之則以是失之爾或曰五季得失天下何易耶曰規模狹也我太祖應天順人規模廣大異於是矣或問聖宋祖宗之所以盛曰太祖克遜太宗克繼卓然在二帝三王間漢祖猶有吝於子唐宗猶無恤乎兄視此愧可知矣或問澶淵之役曰冦公屹然不動如山足以鎮服夷夏之心矣䇿畫盡用豈復有外侮哉或問天書之真偽曰出於王丁之詐而將以章聖之誠上天孚亮仁德以志在沮夷息民也或問仁祖四十二年之治方之周漢孰優曰比隆成康超軼文景或曰如二邉之擾何曰韓范為西方金城富公為北門湯池時焉邊警適足成中國之治安爾或問濮議之是非曰司馬倡是歐陽倡非二公優劣於是乎分矣或問韓范優劣何如曰韓忠於所託天下無間言范勇於自任朋黨之議起意者韓優於范至於臨大節决大䇿易地則皆然或曰忠獻光輔三朝終始大節於古孰比曰功盖天地忠貫日月進則毅然身任天下之重退則怡然了無愠戚之容求之於古其伊周之亞與表表乎博陸絳侯之上爾後不必求多於前功毋忝爾祖斯可矣或問趙中令曰我太祖之房魏也或問李文靖曰我章聖之曹参丙吉也先見則過之或問吕文靖曰我仁祖之姚崇也王沂公則近宋璟或問先慮曰田表聖今之賈誼也先見曰吕獻可今之羊叔子也或問温荆二公之學曰荆公遂己見於食餌温公濟人見於擊甕或問蘇文忠公之志曰志在名節故進退榮辱不足以二其心或問司馬修身治國之論曰萬世君人之法也或問吕范十事十條之目曰君人致治之大端也或問聖宋中興之功曰基於髙宗之仁成於孝宗之明或問中興之佐曰張韓劉岳不挫於檜中興不在江表矣或問金亮之死天耶人耶曰仁與暴德與力於是乎分矣人也即天也邇言卷九

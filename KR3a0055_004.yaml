body:
  text: 邇言卷四宋劉炎撰踐行涵詠聖賢善言如食美食踐行聖賢實德如入荆棘斯人孔子所謂鄉原也道聽途說德之棄也是故君子寧使言不足而德有餘也毋使言有餘而德不足也行仁如循環由義如蹈矩出入乎禮門持守乎信鑰於是乎語於是乎道古所謂有德者必有言也平易而達理者善言也中正而近道者善行也誕言背理詭行傷道君子不由妄語初能妄人終亦自妄詭行初能詭人終亦自詭人受其禍小已受其禍大人之好妄語者朝與夕異十常一二旬浹之間十異五六及其久也燕越背馳不自知矣己不知人知之非惟誠不可掩僞亦不可掩也溫公曰誠自不妄語始善夫善言身之文也不善則疵善行身之輿也不善則敗君子審取舍之權則知言行之機或問心術學術之異曰心其主也學其輔也二者皆不可不正亦在乎善用之而已不善用之則太平典劉歆以之助姦王介甫以之毒天下如善用之則曹參鎮齊民以黃老賈生識治體以刑名魏鄭公以從衡諫諍蘇明允以戰國䇿知治亂安危之機然皆不足以為訓者不如言聖行之為正也諺有之百語不如一默百動不如一靜炎曰己可靜不能必人之靜也己可默不能必人之默也人在天地間則有生有生則不能不與物接其靜也仁其動也義其語也信其默也智則君子人也諺有之千安不如寢百利不如耕言其定也炎曰耕不能無歉嵗寢不能無思夢定者猶未定也是以君子晝參諸踐履以觀其所守夜參諸夢寐以觀其所安善戰者進可以攻退可以守善鬬者進可以搏退可以保安身理家强國之本知所以退則知所以進常人之過也各於其所長君子之善改過也乃見其所以長聖人不見其長何短之有莫名其善何過之有聖人見善則拜賢人聞過則喜聞過如不聞見善如不見庸人也詆善以為非聞過則必文小人也又其甚也懷觸實之怒肆報復之毒其過也何可以易言歟不知而為之過也及其改也不復過矣知而為之非過也及其改也萌蘖復生是以君子有過小人無過欲為君子終身乃成欲為小人一朝可就窮兒無升斗之量賤婦無尋尺之度溢乎其中不能自止有靦於外恬不之覺氣使然也是故聖人道大而小天下賢人君子德充而容物巨商適市有懷百金之寶者有懷千金或萬金者人莫測其孰愈遂操百金而與之較彼百金者忿然其勢敵也千金者歡然其勢倍也萬金者不喜不怒漠然不顧不足較也欲知君子所藴之淺深則亦猶是矣行髙而自卑者裕身之道也行卑而自髙者速禍之道也明珠藏於千仞之淵沒者致之不避蛟龍之害金玉産乎千仭之山采者發之不畏覆壓之變象璣妝首見者嗤鄙碔砆列肆過者不視是以行僞而衒露其名不著德充而韜藏其名自彰甚矣名之難全也天敗之人敗之己敗之天可以勝人可以勝惟己自敗天不能顧人不能慮知而不返隕越乃已返而不亟所喪亦過半矣懍懍乎真可畏懼也哉名有美惡惟大賢流芳惟大姦遺臭鄉里之所謂善惡人者皆不足以為名人莫不有恥惟不忠不義名汚竹帛千古不刋其為恥大矣子孫恥為之後鄉人恥與同國邑天下後世見其姓字如見惡臭唾去而怒罵繼之是以名莫榮於忠義辱莫大於姦邪小人惟慮智巧之不章君子惟憂德善之不著古人有終身之憂憂不為聖賢之徒也今人有終身之憂憂利祿不足以及子孫爾凡民能慈於子孫而不能孝於父母能為子孫長久慮而不知父母之所為我慮者亦然故君子力行孝悌雖不為子孫慮足以為家法矣聖人之愛敬自身始及其終也為天下後世法況於家乎俚俗之人皆有俚號幼未有知忽口之先人笞而誨之曰鄉黨以齒非汝父之執則汝兄之儕也胡得爾炎自是習為君子長者之歸而不復效小人輕薄之態三十謂之成人炎未三十烏知其匪禽炎既三十始去人不逺爾士不恥貧莊周顔真卿皆嘗乞米使周不立言真卿無大節則亦何異於途人是則貧者士之常士亦不可以徒貧也徒貧賤而欲驕人無道義而欲輕王公者妄人也君子貧賤自得未嘗驕於色道義自尊未嘗輕於其上外夸而內歉者必為人之所不屑為貌謙而實至者必能人之所不能為小有才不足恃也得之由是失之由是德無行而不得失則未之聞也仁大無小惠義大無小節禮大無小謹智大無小察信大無小諒邇言卷四

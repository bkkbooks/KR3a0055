body:
  text: 邇言卷六宋劉炎撰人道人道之交以誠信誠信不磨非惟自成亦足成人詐僞無據非惟自敗亦足敗人待人以誠蓋有生之不以為恩殺之不以為怨者誠則公公則天也待人以僞蓋有生之而疑其市恩殺之而疑其復怨者僞則私私則人莫之信也愛己者能愛人輕己者能殺人古者忠以責己恕以待人今人待己以恕責人以忠幾諫父子之恩也揚於外則離責善朋友之信也語諸人則疑獻替君臣之義也播諸國則辱人能無以虛言受實禍無以小利招大辱其度越於人逺矣聞譽而喜必妄譽人聞毁而怒必妄毁人不茍喜怒斯不妄毁譽陵貧者諛富傲賤者諂貴不陵不傲斯不慣諛諂面然背否妾婦之道忠告善道聖賢之徒妾婦之道謂人之忌嫉猶乃心也故常以人之不韙語人聽其言者有好焉有惡焉觀其所好惡則聽者之邪正可知矣人心險夷不難知也處家終身莫知其人同途一日可卜其素同體而後已同位而先人同名不忌同患不避故雖小物必辨義利循是者君子反是者小人惟大姦大佞未可立談判爾小人之交以利平時相親不啻父子一旦相噬不啻狗彘君子之交以義平時講切水火異齊臨難死節舟楫相濟善哉司馬公之言曰覆王氏必惠卿也信然博戲之交不日飲食之交不月勢利之交不年惟道義之交可以終身與君子居不存形迹可也與小人居勿事形迹可乎哉密近君子如濯清泉所染未必變密近小人如失足於汚濘所漸何易深也白受汚易汚反白難自君子為小人易自小人為君子難也幾哉危哉朋友之深交其可忽哉端士深交如入室堂坐卧履止久而愈適邪佞深交如涉溪谷一跌之頃即致顛覆擇交之始勿謂端士無益而逺之逺則孤孤則無以立勿謂邪佞無傷而狎之狎則深深則易以陷失交凡民飲食以為階失交凡士言語以為階知其凡而不交上也既交而失有犯不校猶不失其為智如必屑屑然辨是非則身亦凡矣天下之至易怨者小人至易恩者亦小人簞食豆羮足以得其歡心摩拂豢養足以得其死力一語不讎乾餱以愆則失德矣若夫君子則不然大則行其道小則盡其才恩所知己而巳犬馬畜伋萬鍾養軻則逝矣韓淮隂鄙泣涕者為婦人之仁而復念念乎解衣推食之賜英九江悔怒踞洗之辱而大喜張御之豐卑矣哉烏得不為狗烹也哉是故待君子則以禮結小人則以恩小人好用巧心以愚君子彼自樂其計之得也有不知手之舞之足之蹈之者君子靜以待之如觀優戲一笑可也一或為之動搖則駸駸如入機穽矣小人好以小利汚君子容有受其汚者君子以大義責小人未有能受其責者也受汚則見制不受責則反見害矣暗箭中人其深次骨人之怨之亦必次骨以其掩人所不備也兩軍對壘尅日乃戰鳴鏑交馳負不怨勝罪不在人責在己也故君子之於人與其隂傾不如顯責君子之履世也泛應而主誠致曲而逹道富貴近人人以為謙貧賤近人人以為諂故富貴宜自下貧賤宜自守自下者人愛之自守者人敬之將忘有恩必故讎之將背其言必故尤之是友也古之所謂不學今之所謂口詩書而行市人者也虎狼之澤安得麒麟而友之鷹鸇之林安得鸞鳳而友之惟不待之以虎狼鷹鸇待之以人道庶乎可以自存爾祭祀必立尸講學必立師敬尸敬其先也尊師尊其道也不敬其先非孝也尸何與焉不尊其道非賢也師何與焉或曰近世何師道之不立耶曰古者師道德漢魏以來師經學隋唐而降所師者場屋之文而已宜乎師道之不立也邇言卷六

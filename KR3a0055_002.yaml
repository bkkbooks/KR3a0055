  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0055_WYG_002-1a, image: WYG0703/WYG0703-0514c.png}
body:
  text: 邇言卷二宋劉炎撰存心存心莫大於仁正心莫急於禮生於其心而復以成其心天人之道也心者誠之宅也家國天下誠之逹也天下可欺也國人不可欺國人可欺也鄉鄰不可欺鄉鄰可欺也妻子不可欺妻子可欺也方寸不可欺一或有欺悖亂之言形於夢寐雖欲自揜其可得歟終日行險志得意驕中夜以思惕然隠憂終日履平無得無喪中夜以思湛然氷清君子與其終日有快意之舉不如中夜獲一息之安也人非堯舜氣質之偏不能無過不及之患必加儆省則善矣惟心原不正觸物生變者不可以櫽括聖人之心正大如天地賢人之心明白如日星庸俗汚下如禽犢其有習為姦佞者險於山川深於城府慘於矛㦸暴於虎狼聖賢庸則易知惟姦佞難知難知故難顧慮雖聖人亦畏難知矣誠者萬善之本偽者百禍之基聰明勇決智慮過人濟之以偽速其死矣何止為小人㝠蒙遲鈍了無他長將之以誠厚其生矣何止為君子樸實如良金不勞覆䕶百鍜鍊愈剛巧詐如璃罌倍費防閑一跌踣莫救禾心為仁桃李之心為仁仁人心也患在不能充之爾人孰無仁充之有小大人孰無智用之有是非小則姑息非則詐儇是故好行小惠急於人知匹婦之所謂仁也夸逞小才好為人上匹夫之所謂智也斯仁不足以自福斯智適足以禍身聖人達仁智之大致必也以義行仁以德行智乎聖人以仁為宇天下無不覆賢智以仁為途善類所共由人莫病乎有慾而無德也氣剛而有慾且見制於婦人欲稱丈夫不可得矣年耆而無德猶見侮於童子欲稱先生不可得矣飽食煖衣人以之生亦以之死一日失節寢寐不寧疾病生矣終身失節後嗣無觀禍敗作矣人能不以是為身心子孫之害者其加於凡民一等矣貧賤患難進德之階富貴安佚陷身之壑惟下愚不以貧賤患難有進惟上智不為富貴安佚所陷老成慮事不必皆髙年輕躁寡謀不必皆年少觀其臨事如何爾盗中有道衣冠未必非盗軍中有仁口銜清議者未必皆仁觀其處心如何爾君子以義制事以仁存心心其至矣乎其生也清其没也寧其動也正其靜也定聖賢則然愚不肖反是四銘莫小於心與生而俱莫大於心包含萬殊本自正平無勞扂楔飛來塵垢隨即磨刮遷忿逐慾至明者昏踰越奥窔出入多門駸駸險巇株枯足蹶非惟無益本實先撥待物以穽機隨變生一徃一復亦足自傾身傾禍微爾裔肖爾萌蘖蔓延源源不已乃知此心廣大則天中正則人傾仄汚下則禽去禽門由人道反性天其樂莫可言也自然而不必然者具性之全也已然而不能復其全者非賢也是用作銘並告五官各守爾典無妄闓端斯心銘也見可欲而心不亂其思定遇坎窞而知儆省其思深格物以理慮而接其思至博大而不荒委蛇而不局其思正居乎中央運乎四方凡有所適不失其鄉斯思銘也慮而接三言上下或有闕誤衣冠適市市人避之袒裼居室室人戱之貌之不可不修也如是信誓於郊三軍聽命戯言於庭僕妾慢令言之不可不修也如是貎言不修其應若是内行不修益可知矣内外交修謂之君子内外交廢謂之小人修廢之頃間不容髪及其乆也天壤遼絶君子人歟可不謹其微敬所發歟斯貎言銘也冶容過目目挑心招鄭聲入耳耳瞶心揺招招揺揺衣冠狙猱禍機及之不知避逃凡視冶容如臨嚴父凡聽鄭聲如震斯怒視逺聽德心正則誠不誠無物惟誠則形汝聽不誠人將汝聽汝視不誠人將汝視無恤乎人無不為矣無所不為隕踣乃已古人戒慎乎其所不睹恐懼乎其所不聞不遏於流而塞於源其以是歟斯視聽銘也邇言卷二

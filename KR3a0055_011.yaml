body:
  text: 邇言卷十一宋劉炎撰習俗場屋之文朝廷假以取士與學優則仕異矣士大夫以此髙下人物更相矜傲更相景慕亦可悲矣善乎敷文鄭公之言曰不為俗學所纍者可與言理道或曰十室之邑必有忠信今也百里之地恨無文行者何也曰文壞於場屋之習行蠧於科目之路文行且非孔門之舊忠信從可知矣或嘆無嚴師畏友曰非無也未之見也有嚴師教亦不行有畏友諫亦不入近世流俗之患也徇俗而忘已從流而失正斯師友也何嚴畏之有古之教者慮道之無傳也今之教者身不行道何道之可傳悠悠風塵外科目之習不談也師夫人師夫文也道不至無議焉授夫人授夫文也道不進無責焉膠庠辟頖皆然矣私淑諸人微有異焉羣然誚之近世宦學之士在人上則樂人之譽已在下則不敢以咈人嗟乎萬乘而容匹夫之賤匹夫而規萬乘之貴受諫誠難進諫亦不易矣堯舜聖之極也聞以從諌為聖漢祖唐宗雄略髙天下不聞以譽已為樂鄉人輒復爾兹其所以為鄉人歟流俗之所謂富貴者好陵貧賤之士能使人欲富貴之心躍然而起如得其道猶不喪其初心茍失其道富貴未必得而所守己變遷矣是故君子不以世俗為輕重而以守道俟命為良寶未遇之士常見慢於人及其既遇必見敬於所慢者俚俗積態耳君子無責焉小人則施報愚役一里不知有市里氓智也里有善士則鄙之奔走負販逞夸長雄市井智也邑有善士則鄙之大略容天下其次容一國胸中不能容百夫而好行市里小慧難矣哉世俗之所謂智乃天下之至愚世俗之所謂愚乃天下之極智恃巧而窮則壞恃詐而窮則敗恃力而窮則斃今之士也有時出智巧詐力以示人者冀夫人之畏己也悲夫上而王公下逹庶人有不能善使人畏而不敢言者敗亡之兆昭矣君子畏己直言日踈小人畏己佞言日至受佞棄直罪惡積矣積之不已欲無敗亡不可得矣乘亂而幸蚌鷸之困激紛而伺兩虎之斃秦人鬬六國漢唐待夷狄之術也較以帝王仁義之師已罪人矣儒冠闕行者或用之於鄰里鄉黨或用之於涖政臨民刻薄之風莫此為甚此條疑冇缺誤悻悻愚俗何彼已之多耶上而朝廷下而閭里內而閨門外而交友汨汨然以是終其身爾聚蛇於甕勢必相吞聚虎於圈勢必相噬更相吞噬螫暴者勝吞噬無餘螫暴亦斃不善之家不良之朋自相屠戮其勢亦然勝心之為患也久矣小欲勝有小敵大欲勝有大敵已且然何以必人之不然哉小人耻不若人每勉強於義所不當為力所不可及者其亦終不若人而已下愚之氓欺天誣神終日不義晨起諷唄終身不仁嵗祈長年漫不知其自欺自誣也天可欺神可誣哉家溫而務茍得者速貧之道也年盛而憂日莫者速死之道也身佚而好行險者速禍之道也知斯三者則知所以守富貴保福祿也里翁貪得朝夕營營步止忽忽機智投空鬚髮為白君子謹欲惡之機察取舍之微道德以為宇仁義以為途乃若所得則異於里翁之為矣甚矣世俗能其所難而不能其所易也能赴水火者未必能忠義能斷肢體者未必能孝弟或曰禮義生於富足何如曰知稼穡艱難者富貴則禮義生未知稼穡艱難者恩意生於凍餒悖逆生於豢養而已飲食相歡君子以之逹情小人以為恩怨鄙夫得祿則妾其妻賤婦多資則奴其夫舉目市里何鄙賤之多也奔走髙門眩俗規利者十且八九况乎出入禁庭依憑勢要君相獨能保其無姦利乎斯人也敬而逺之則智矣既與狎近復施防間而曰吾智吾不信也邇言卷十一

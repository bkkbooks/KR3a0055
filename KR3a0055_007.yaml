body:
  text: 邇言卷七宋劉炎撰君臣君道莫大於建中臣道莫先於守正君道立則人心一臣道盡則民風淳大哉我孝宗之言曰人皆可以言朋黨惟君相不當言朋黨凡曰朋黨無問其人惟公是公非之為務君道於是立矣至公之權於是獨操矣大明東升羣隂自伏大君自立朋黨自消人心畏者剛極也人心玩者柔極也皇極既建天下為公尚何朋黨之有哉天地五行之精英萃於朝廷君子在位散於天下君子在野是故治世多名臣良相亂世多賢士隱君子治亂之機於是乎占隂陽天地之道也六爻之義也陽為君子隂為小人陽善用隂足以成物君子善用小人足以成事不善用之而又求以亟去之適以速其變也速其變則隂在內以制身小人居中以制國大事去矣善理身者內陽而外隂善理國者內君子外小人而已君子小人凡有係於國家治亂成敗之數者皆非庸人比斯君子必有過人之德斯小人必有過人之才一愚一智愚為智役一强一弱弱為强制人皆若是國無敵國家無仇家矣智與智角計必有中强與强遇不能無傷中傷既多怨讎深矣怨讎既深雖欲自已不可得矣是故小人計以中人常詫暗箭靜以觀之則鳴鏑也惟不立標的無所施其巧若郭汾陽之待魚朝恩斯可矣不然則蕭劉見陷於恭顯漢黨錮唐朋黨諸君子皆中小人之計矣甚矣執偏之為禍也人主執偏禍社稷大臣執偏禍蒼生唐德宗執猜忌之見陸贄輩千萬言不能回其聽近世王安石執强愎之吝司馬公千萬言不能破其惑其禍社稷蒼生不細矣聖君善始足以知終善與人同胡能有過中君善始不若保終急於為善不如改過欲觀帝王之度於其用人足以觀之矣能用一國之善士則足以君一國能用天下之善士則足以王天下善士不輕為人用能用之其度已足以容之矣或問人君以納諫為盛德人臣以進諌為大忠者何也曰人君一嚬一笑天下之休戚繫焉而況於過舉哉進諫則能救過納諌則能改過其為天下後世福大矣烏得不謂之盛德大忠哉一海東青爾我太宗却之而興天祚好之而亡君人者可不謹欲惡取舍之端哉我太祖之於漢祖度量如出一人太宗之於唐宗言行如出一身不嗜殺人能一天下我太祖有焉宜乎守天下之規模逺過於漢唐也我太宗之言曰虎度鳯集守令猶能召和帝王惠民理寃豈不易然炎曰聖宋德為立國之本仁為相傳之法大抵然也仁祖尊號曰仁仁道於是乎成矣熙豐大臣欲以所學鉗天下之口而倡為三不足之說是甘為商君之為者也賴我神祖不為孝公爾不然黥師刑傅矣烏有致君堯舜隆制成周者反行管商之下策歟田錫論列宰相非人於時李文靖實在中書錫不以為忤沆不以為訐諫官宰相之體兩得之矣趙清獻之詆范蜀公吕獻可之劾韓魏公龎建水洛韓不以為是韓刺義勇司馬力言其非濮議之興臺諌斥宰相如敵已熙寧刑名之議吕晦叔是介甫而非君實是所謂和而不同也故凡一倡而百和未必非小人之黨臺諫所以正君律臣也不曲不阿真臺諌也次則徇人君喜怒之私下則為大臣鷹擊狗搏之具天下有道士大夫有是非而無毁譽天下無道士大夫有毁譽而無是非公正之言氣和而平阿曲之言氣咈而傾事君之道智有餘而忠不足不若智不足而忠有餘忠無適而非正智或足以濟姦也或問事君能致其身者何謂也曰不愛其死之謂也不愛其死何事不忠茍愛其死何事不佞惡莫大於反所主故禍莫慘於受反善莫先於忠所事故福莫長於用忠髙祖戮丁公漢以之興武帝受侯景梁以之敗緣木坎石可登萬仞之崖所患者進易而退難纍梲叠桷可支垂圯之堂所患者髙易而下難是以大臣以道正君不固天下之權以義定國不留天下之勢事君以不欺為根本溫公思天下事故雖暗室衣冠肅然以此立朝不復有欺君之事矣邇言卷七

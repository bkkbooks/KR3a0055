body:
  text: 邇言卷十二宋劉炎撰志見炎十有九侍先君游臨川之泮覽荆公之宇遺老欷戱不忍道荆公之事近觀國史靖康之變金人南下輒克衛温公之冢温公見慕於敵國荆公見棄於鄉黨二公學術於是可知矣渡大江望金山緇衣環其上恍然非凡致也將纜舟而覽焉風利不得泊甫登儀真憇濵江佛廬有緇衣踵來問所從則金山也嘻予欲至而不可汝既至而不留何也答曰未至則以為世外之樂既至如窓中之蛾樂所樂松門竹區而有餘憂所憂金馬玉堂而不足方寸尚塵是以不樂金山之樂也登西湖之孤山見所謂陳朝檜一枯一榮有穉子跣立其旁謂余言曰是檜㡬百年矣榮者弗生枯者弗死又循坡而行見林和靖屏居之址存焉乃悟榮與凡木也等雖榮奚益枯與凡木異雖枯奚損和靖之名猶是枯檜穉子之云殆警予也游吳山翛然獨坐望海門二峰隱然如天關潮來喧如瀉天潢大舶髙檣徃來出没如泛天槎又嘗游郡仙都偃卧小舟仰觀天柱石純潔光潤如琢本末齊一如度髙挿雲漢可五千尺其旁數石或如海舟檣或如太常旗皆且千尺餘其四山石宂棲巖者繚深穹然如厦屋跨水者擊之有聲逢然如鼉鼓夫觀錢塘江潮猶猛士之肝膽決裂義士之怒髪衝冠觀仙都天柱猶直臣之氣不撓不折社稷之佐拓地擎天為是而來游來游而慨慕者幾何人至於西湖之上有所謂水樂園中閹作之也有朋命駕偕之泉激溜如岑蹄石累豢如飯砂游者駢肩接迹觀者嘖嘖詠歎至有游而忘歸歸而復游者何也務小智者忘大巧樂人偽者昧天成也孔子見大水必觀焉登泰山而小天下盖不徒山水觀矣或問錢塘江潮變化若神物司之曰地秉隂竅於山川山川通氣猶頂踵之氣血周流也水隂物也月為隂精潮為水波竅激氣通故潮隨月而消長或問三皇而上謂之洪荒洪荒迨今僅逾三大紀天地開闢何其邇耶曰天限南北長淮荆榛昔嘗周游其間見流徙者土處童稚不窺烏巢殆與太古之俗無異乃悟天地開闢其來乆矣凡經大變即洪荒也三皇而上文籍未全故其事濶略無傳後世楮筆便利故其事易考爾或曰淮堧千里濵接魯鄧昔為奥區今為極邊夏風如焚冬風裂肌鳥獸交跡草木不蕃豈天地温厚之氣有時而轉徙耶曰人者天地之仁也人之所聚仁氣聚焉人之所去隂氣積焉深山曠郊屯師百萬窮冬之候温然生春華堂大宇悄無人迹幽隂侵薄久則摧圮是皆於人之聚散占之爾道桐江登釣臺見艤舟而登覽者袂相屬也慨慕者嘖嘖援筆而頌清風者不自知其喋喋楹楣壁崖長歌短章新陳稠叠終日閱而不足大抵名者欲棄名利者欲置利以從吾子陵遊也解纜而東名利初心其孰能為子陵故損毫末乃知自洛陽而桐江斯其所以為子陵由桐江而洛陽欲為子陵吾不信也讎者也善用兵者能使上下恩交如父子三軍勠力如兄弟必也復父兄之讎所向莫之敵矣此條疑有缺文窮閻之下有對奕者施機運神如敵國然自旦達暮饑不知食渴不知飲勝則怡然負則愀然一勝一負所得漠然勝負無得饑渴有䘮何以切切然哉勝心生也世之好紛競而角勝負者亦然其終未必有得而所喪亦已多矣步龍潭之洲見羣弋者賭杖頭金巧勝拙負不易其素既而標金十之巧拙之中勝負相半既而標金百之拙者或勝巧者或負勝負累其中則巧拙易於外也人能不以得失動其心則其素所有者莫能易矣嘉泰之元有惠鳴鳩蓄之庭或奮擲籠中不食而死或奮擲且食不死而瘠或馴伏自如食肥澤一日縱之死者已矣瘠者羽翼不全不克逺舉惟馴伏肥澤者一舉而入乎蒼蒼嗟夫人在塵籠不順性命與安時俟命者何獨不然邇言卷十二

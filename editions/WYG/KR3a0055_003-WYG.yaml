body:
  text: 邇言卷三宋劉炎撰立志心無得則志不立志不立則事不成事不成則妄動輕舉不根於素夫是之謂妄人昔者二帝三王志於仁天下漢祖唐宗志於定天下伊周自任以治孔孟自任以道下而荀卿揚雄期以言語文章成名於後世皆其素有得者也聖人有容天下之度故能以天下為一家賢人有修身治人之志故毁譽得䘮一不足以動其心遭變不迫其人未可量也處常失措其餘不足觀也已人之為人見窺於人則其行不逺軒冕榮身視之若無簞食蓬户視之若有斯人也中之所有者大而外之所無者小矣所有者大無不可為所無者小無復可汚不顧分義而㝠行者志於得也反已求之得未分寸失已尋丈是富不可以志而得也不後學力而勇進者亦志於得也反已求之日計不足嵗計有餘是道可以志而得也志者主一不二之謂也雖聖賢亦止能求所本有不能强所本無也忠臣義士氣拂雲漢文人才子之氣亦然其所以然者不然矣君子志於澤天下小人志於榮其身當其樂仕之初則同及其既仕所趨異矣是以天子達於匹夫莫不有志氣顧其所之有小大正邪爾氣在人上者志或在人下志在人上者不必以氣陵人志主乎一氣或妄用也有大志者時亦有大言好大言者不必有大志義所當為堅守不移安時俟命不急小利志在其中矣内樂無有譊譊妄言所守不固倀倀妄行斯人也夫何志之有聖人之氣渾然一元也賢人之氣温然春陽或凛然秋霜也庸凡之氣汚姦佞之氣賊以氣豪者亦以氣沮以力勝者亦以力屈榮以勢辱亦以之雄以財憊亦以之是之謂中無所主托外物以為主故其終為物勝也有富之萌處以滿盈復於貧矣有貴之漸處以驕極復於賤矣是之謂變常變常則不能常有其有也或問立志之道何先炎曰定意氣博徒豪於一擲酒徒豪於舉白長槍大劍戰士豪也長吟大篇文士豪也凡曰豪舉皆非意氣之定也或問近世馬范二文正公如何炎曰志立范志於任司馬志於誠始於其身終於事君皆此道也孔子曰士志於道孟子曰士志於仁義士其可以自棄哉窮兒猝富市里慕焉匹夫暴貴友黨慕焉率德改行慕者鮮矣師周學孔法堯蹈舜嘗聞其語矣未見其人也凡不慕下俚之所慕者可與進德入道矣君子立志誠信以養心忠孝以安身仁義以為富道德以為貴積而後發其發也大大舜德冠百王伊傅才髙千古然猶俛首耕築若將終身今之匹士未聞寸長已發不遇之嘆不量而已矣未仕善士皆可為也既仕循吏皆可為也病弗為耳夫孰禦或問君子出處之要曰居不可以素隱仕不可以素餐上無與於國家治理下無與於風俗名教斯其出處亦可占矣出處之道主忠主孝内有所主則外無所忘鬬擊忘身忿䦧忘家朋黨忘國所主既失禍敗及之雖悔何追或問嚴光何以無濟世之志曰出則功被天下處則名厲將來是物也光武子陵盖中分之矣古今之隱者有三其上有諸已視時不可施則隱其次揆諸已於時無所施則隱其下内無所有復不自量託名以隱釣名鈎禄及其用也禄可得名不可得矣或問儒者之隱何如曰游心於六藝玩意於五常陋巷可也市朝可也不必深山宻林之之也邇言卷三

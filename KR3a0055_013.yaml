body:
  text: 邇言後序予讀劉子邇言屢廢而嘆有問者曰劉子之言常言也子何嘆之數乎予曰子以予為玩其文辭也耶若惟文辭之玩而已則劉子固常言也夫孰知其有功於學者耶夫學莫先於知性知性而後知天之畀於人者厚而望於人者深盖人之有生雖與物同而備二氣於身根五常於心則夐與物異故必如堯舜之善而後可謂盡性仁義禮智之端有一虧闕則以人眡物其間相去者幾希夫人受此性於天猶其受任於朝也一理弗循謂之違天一事弗治謂之曠官知是乃知返矣嗚呼有志於學者其尚懲予之不敏也嘉定壬午九月辛未西山真徳秀序先生於先君為同門友故克自既冠得執經講下每聞議論必稱遯齋克雖不敏記憶不去心越五年入太學又十年竊第以歸先生出邇言十二篇則向所稱者往往載於此口誦心惟欲贊一語又不能又十年分教延平見今待制真先生所為序益不敢措筆顧惟先生家學源流克所稔知者不可無述昔孔庭詩禮之訓不及四經常情觀之其言若邇而陳亢以為君子之逺其子者在是然則觀此書者誠知遯齋之授先生也既有以逺其子先生之著此書也又將以逺夫人豈直邇言而已哉嘉定癸未冬十一月望學生修職郎南劍州州學教授葉克跋

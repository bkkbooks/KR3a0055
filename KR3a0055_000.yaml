body:
  text: 邇言儒家類提要臣等謹案邇言十二卷宋劉炎撰炎字子宣松陽人是書分十二章曰成性存心立志踐行天道人道君臣今昔經籍習俗志見其立言醇正篤實而切于人情近於事理無迂濶難行之説亦無刻核過髙之論如曰井田封建成之非一日其壊也亦非一朝之故不必泥其制也能存其意亦可以為治矣又曰或問節誼之士如之何而黨錮曰自取之也君子百是必有一非小人百非必有一是天下士至不少矣豈必登龍仙舟者皆賢不在此選者皆不肖耶更相題表自立禍的者也人豈能禍之哉又曰或問學聖賢之道者其流亦有偏乎曰近聞之真公學而至之烏得偏學而不至雖孔孟門人不能無偏能遡其源其流歸于正矣不然毫釐之差其謬逾逺是足為學二程而不至者之戒也如此之類皆他儒者心知其然而斷不出之於口者炎獨筆之於書可謂光明磊落無纖毫門户之私矣此本為嘉靖己丑光澤王所刋考明史諸王表光澤榮端王寵瀼以成化末年襲封前有梅南生序稱得抄本于棠陵方思道梅南生即寵瀼别號也又有嘉泰甲子炎自序嘉定壬午真徳秀後序嘉定癸未葉克跋書中治道篇第一條第二條習俗篇第十一條志見篇第九條寵瀼俱注有脱誤今無别本可核亦仍其舊又經籍篇唐無全史一條中亦有訛脱而寵瀼未注又經籍篇第二條下有夾注止庵曰一段駁揚陶潛蘇軾而抑屈原之非其言有理併附録之考寵瀼序末有私印曰止庵則此注亦寵瀼所加矣乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀邇言原序宋儒劉先生邇言一帙條分十二章累萬餘言盖先生所自著故名邇言謙稱也其言皆窮理盡性成已成物樂天知命居常應變間涉治平修攘之要實内聖外王之學洙泗以来濂洛闗閩間命世醇儒也當時特見重於真西山先生終宋迄元其言未見表著予間得抄本於湖臬副憲棠陵方思道先生謂予曰是書精思至論最有益於學者宜梓行以恵後人予莊誦盡卷仰而歎曰聖賢教人六籍之外口授心𫝊亦諄諄矣而俗學承𫝊惟事口耳而於身心性道初不相涉殆亦功利之移人枝葉辭章之習與性道之學一膜之外已分物我矣安望其能進於是耶是書誠不可不行於世也乃重校訛舛闕其疑者捐禄羨重書鍥諸棃行之用副方先生以心學教人之雅而劉先生著書以望於後之人者其亦在是歟刋成爰序以識嵗月時嘉靖八年三月望日後學南郡梅南生序邇言自序言近而指逺辭約而理盡天下之至言也非聖人其孰能修之是故論語一書獨具中和之道次則孟氏七篇莫非浩然之氣又其次也荀卿辨而肆揚雄約而拘王通華而僭雖三子所言得失不同艱易不一然皆得明道之一端著書之一體有過於老莊申韓之説逺矣先漢而降𫝊經述史先後相望文籍浩繁殆百千家至於諸子如揚雄王通之説絶無而僅有之蓋古人之文辭不勝意今人之文意不勝辭者其源皆壞於科目之習汨於利禄之途也儒者以五常為質六藝為文融心三才㳺步千古天所賦予不薄矣必也不徇流俗仰思聖賢凡有論著不必放意寓言不必僣稱法言不必茍同不必茍異惟履諸身而後議喻諸心而後語不為捭闔以賊正氣不為雕刻以傷正體始於近情終於達道庶乎其可也先君遯齋好古學耳提面命必以義方不幸弱冠之初遽罹陟岵之戚飄泊西東駸駸知命之年貧賤素行之矣艱難備嘗之矣故於流俗之習多所悔恨窮通得喪之分多所開悟人情物理事變世故之間多所儆省承師問友考古驗今輙隨所得紀為邇言承先志也非曰指逺理盡僣擬聖賢之作也竊自比於芻蕘之談狂夫之論云耳昔夫子猶能鄙事大舜猶察邇言未有鄙事不能而知至者未有邇言不察而知化者斯言之著固多得罪於作者恕其鄙而察之可也其或所志不同亦不勞以覆醬瓿譏之此下才十有二篇續有聞見録為外篇云時有宋嘉泰甲子正月朔日括蒼劉炎子宣自序

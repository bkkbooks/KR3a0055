  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0055_WYG_008-1a, image: WYG0703/WYG0703-0530a.png}
body:
  text: 邇言卷八宋劉炎撰治道治天下有常道上承夫心中和人情下順物理而已急於為治不得其道亂之階也急於立法不得其道弊之萌也不始治在其中矣如始弊法在其中矣然則治亦不足為法亦不足立歟曰非也為以天下立以天下勿以私參之也此段不始至法在其中文理欠通疑有闕誤財者生人之命也天地施生之仁帝王取予之義存焉仁以仁之義以宜之民命乃全凡民無財無以仰事俯育廉恥之道䘮矣凡民多財起閨門之爭益子孫之過禮義之風衰矣生斯生財生民斯也使之凶荒有備生死無憾足矣過不及皆非凡民之利也嗟夫三代井田仁矣哉取予有節義矣哉先王立法之義意深矣哉何秦人之瞽戾也哉使是民不得為三代之民者秦人之罪也生斯生財生民斯也八字間有脫誤以不成文或問周秦修短其由興廢封建乎曰周自后稷公劉迄於文武世積仁厚封建亦治不封建亦治秦自孝公以來世積詐力封建亦亡不封建亦亡秦不封建胡亥猶奪扶蘇之位誅戮十二公子趙髙猶置李斯於極刑擠蒙恬於死地秦必封建則同姓異姓各有土地甲兵之彊更相屠噬亦不過再世而已况乎井田封建之本實則相關秦開阡陌大本去矣其何以封建哉必欲知封建之本井田是矣必欲知封建之意則聖人作易於比卦言之盡矣比之為卦坤下坎上寧不以先王建諸侯上下一心君臣同德猶水之在地周流浹洽無間然歟知乎是則知三代封建之意先立而後其法行秦人封建之意先亡而後其法壞肉刑即象刑也象而示之犯者寡矣漢文帝有仁心而無仁政輕於變古觸憲滋多雖欲囹圄空虚不可得矣或曰肉刑何以不可復曰人惑其名而不要其實人其可以户曉歟或曰井田封建何以不可復曰是制也成之非一日其壊也亦非一朝之故不必泥其制也能存其意亦足以為治矣或問古今學校之制曰古者先德而後藝先行而後文後世教者校藝而不及德學者言文而不及行古者官制亦可知矣古者量材而授下亦自量而受後世反是古者取民有常制粟帛布縷力役之征或用其一或用其二後世無所不用則亦無所不取何必三者而已哉古者官兵民有常職故費約而兼足足則交相養後之官兵民無常職故食冗而俱貧貧則交相賊周禁羣飲以節民心漢戒酒醪慮乏民食後世𣙜酤意則異矣古今立法名實背馳大抵若此古者疑赦今乃赦罪古者宥過今乃宥故是古今赦宥之名同而實亦大異也禮教天下之防範賞刑有國之紀綱禮教行則人知榮辱刑賞明則人知勸懲與其勸懲於後孰若榮辱於先上不知有榮辱下不知有勸懲防範紀綱其可置而不省乎一日之頃有晝有夜四時更代有隂有陽一代之興方其明盛君子彚征及其變故之將興也小人交亂不有女主則有強權不有僣叛則有夷狄之禍數也惟天子不可以言數必也觀時察變事為之備固結人心遭變不移多蓄賢才為後人用是之為以人勝天惟聖人能之然則漢運中衰稱聖易號奉天之禍城以厭之卒不能逃符䜟語果可以人勝天乎曰堯湯水旱是足以言數矣哀平失政德宗任詐非惟不能勝天而復有以速天之變猥歸之數可乎或曰漢太宗我仁祖皆治世也何災變之多耶曰天愛人君警以災異父愛賢子示以教戒皆所以成全之也如其不足成全則委之聽之矣若李文靖之用心可謂大臣矣日奏災變可謂知天意者矣先正儉訓曰由儉入奢易由奢入儉難炎曰儉者國家之大寶漢文帝知之故用度常有餘武帝不知故用度常不足使有國有家者凡事簡易常如剏業之初動遵檢束不由儉而入奢尚何不足之有入其庭汚則新敝則葺器用有常服食不詭斯起家已入其國田野闢郵傳治野人多於市游手寡於農斯興國已家國無二道家之興也父子和兄弟睦婦姑順事僕妾稟令漢唐盛時君臣各盡其職何以異此家之敗也父子暌兄弟䦧室堂藩籬妾婦長舌曾不知外侮之及也漢唐之衰君昏於上臣亂於下知分曹植黨以固其位而不知盜賊之至也亦然知其然而制於未然非至明其孰能之哉靖康之變非細故也朋黨之士猶相傾擠曾不知大敵之在前敵騎之在後也於時謀臣智將朝更暮置如航鯨海數易柂師危亦甚矣賴彼金人悔禍厭兵天心人意係於至仁爾然則朋黨之患深於敵國無朋黨則敵國不足畏矣容貎堂堂觀其氣骨不觀小慧厦屋渠渠觀其規模不觀微巧我太祖之有天下也談笑間去節度數百年之患嚴階級銷武夫悍卒凌轢之態出征之日誓不殺人而天下平不戮降王而諸國附凡歴代所謂權强閹寺等患一切無之氣骨端嚴規模正大是所謂有道之長也或曰聖宋規模逺過漢唐惟待夷狄之䇿莫知適從何也曰太祖將遷雍洛李懐忠一言而止章聖將幸長安种放一言而止茍一時之安失萬世之利二子之智何如奉春或曰井田既廢自漢迄唐皆收屯田之利我朝何獨不然曰五季易置皆以兵也養兵如養驕子抱兒哺之猶慮不食如之何使之耕而食耶律以階級亦已善矣姑以民田而徐以兵田使之知有倉廩之積室家之奉踐其利而忘其勢顧何有不足之意哉聖宋經綸厚德培埴至仁生養休息惟恐傷之一祖三宗之治其在人者深矣熙豐大臣乃欲代稻粱以稊稗續梧檟以荆榛斯人之智曾農圃之不如斯不足以謀人之國矣靖康建炎望敵投拜者多矣紹興以來迎敵追拒太平之人不覩兵革不若習見戰陣之為愈帝王盛時故雖無事必蒐苗焉必獮狩焉使民不倦不悸居則有不虞之備用則為仁義之師弈貴爭先子不虛置故能以一敵十兵貴爭先機不虚發故能以一當百賞刑人主之柄也設而不用上也用而有經次也予奪無章僣濫不度斯為下矣或問為政寛嚴之尚炎曰近聞之真玉堂云毋論寛嚴亦惟仁義而已寛本於仁何至於民慢嚴本於義何至於民殘斯足為為政之法矣或問後世循吏何寡耶曰郡縣之職在乆任任不乆則親吏而不親民民不及親席不暇煖其意若曰何以循良為也况乎仕者曠閒之曰多居官之日寡滔滔皆為身計耶從政莫先於省吏約文書吏省則蠧民之害寡文書約則吏不得而瞀之涖官從政有一言可以得人心者其㢘乎有一言可以失人心者其貪乎㢘則約己而厚人貪則浚人而自厚知自厚而不知厚人雖曰剖決如流私泥之矣方寸清明慾亂之矣方寸自亂何以知人心之得失哉有汚吏之罰無㢘吏之賞則汚濁多必得實㢘而旌之人其肯自汚歟薦舉未有不求而得則無以禦人之求舉爾所知不待其求而予之人其肯妄求歟治國理家之道於所不可不有者無之不振之漸也於所不可不去者存之起禍之萌也或曰後世立法惟便利是從何其弊之多也曰楮筆便矣不如竹簡之重質錢幣利矣不如穀帛之充實天下之弊未必不生於便利也三皇之氣渾如元氣五帝之化大如天地三王之治昭如日星治道止於三代求多於三代者皆過也邇言卷八

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0055_WYG_010-1a, image: WYG0703/WYG0703-0542a.png}
body:
  text: 邇言卷十宋劉炎撰經籍或問詩三百一言以蔽之六經之義皆可蔽以一言乎曰禮毋不敬樂不可偽書執厥中易常其德春秋一字惟公皆無邪之謂也詩之流三變國風雅頌美刺以正子虛上林風勸以私晉宋以來嘲吟風月摹寫卉木而已至於託物見志一飯念君則老杜酸辛優於太白之放蕩叙幽情述曠懐則淵明歸去東坡赤壁優於離騷之怨懟止庵曰陶蘇與屈平於君有異姓同姓之不同屈平怨懟於君即大舜怨慕於親之心也未可以此議平也或問書有艱深易直之異何也曰古文二十五篇則易直伏生所傳多齊語故艱深晁錯在當時十且不知二後世强為之說不無謬妄矣或問周禮果聖人之全書乎曰司門譏財物之犯禁者舉而没之司關凡貨之不出於關者舉其貨罰其人周公於民之意慮不若是之察也或問連山歸藏之真偽曰漢志不録連山唐志則有之漢志不録歸藏晉中經隋唐志皆有之昔無今有其偽可知况其言之不經耶或曰六經遭秦火惟易以卜筮之書得全春秋何以無闕文曰一字褒貶其文藏諸人心胡得訛謬或問經籍闕文可以意見足之乎曰三代經籍厄於秦項之火兩漢經籍厄於莽卓之亂中經四部五胡雲擾靡有孑遺七志九條五部七録周齊兵火咸自焚之後魏有書散落於爾朱隋氏之書漂没於砥柱有唐之書再厄於禄山黄巢闕文多矣必以己見足之八寸䇿必有八十宗之謬矣或問易春秋天人之道劉歆比而同之何如曰一身之脉絡則貫穿而耳目鼻口之形則不同不求合乎易春秋之理而附㑹其數猶比合乎人之形也洪範五行傳大略亦若是也其所以異者向欲興劉歆欲附莽而已或問周唐六典之同異曰唐象周為制而已茍其制同修書朝夕可就也何必更易數十人綿延十六年哉或問六經䜟緯之是非曰夫子不語怪力亂神䜟緯不足信明矣用以釋經是則漢儒之罪也或曰六經傳注不同學者師其是而已何西漢諸儒執一見也曰主一經之說而勝者驟用主一經之說而負者左遷漢君實使之然耳或問兩漢多經師漢以來何寡曰昔求之顓門後世則師紙上語也或問古今文籍何煩簡之異曰古文難知加以竹簡之重質此其所以簡也今文易知加以毫楮之便利此其所以煩也簡則意全煩則易鑿全則人淳鑿則人偽至於械用莫不皆然何獨文籍而已哉或問九流七畧之别儒墨雜處邪正混淆何也曰以書言不以人言也區别其書各有門目以備歴代藏書之䇿云爾決擇去取存乎人必焚其書則反害己或問諸子立言之體曰古者一言足以盡道今也千萬言僅足述古人一二而已聖人言則成章無待强作必也得立言之體則孟氏亞於聖人荀揚王其次也韓柳又其次也不及韓柳不能傳矣或問荀揚之得失安在曰立言則荀不雕篆雄多模倣辯理則雄有據依荀多偏執荀揚得失王通盖兼有之或問賈誼董仲舒之文曰仲舒春風賈生烈日或問温公功業過揚子雲逺甚平生所為文章乃有慕於子雲何也曰欲成名於後世之趣同也或問子雲不及孟氏而温公疑孟者何也曰讀聖賢之書知之為知之不知為不知是知也西銘以天地為父母聖人是也人能以父母為天地約而求之仁亦不可勝用矣孔子曰事父孝故事天明事母孝故事地察天地明察神明彰矣而況於人乎而況於物乎或問學聖賢之道者其流亦有偏乎曰近聞之真公學而至之烏得偏學而不至雖孔孟門人不能無偏能遡其源復於正矣不然毫忽之差其謬逾逺是足為學二程不至者之戒也或問歐陽司馬之文孰優曰歐公本之韓退之學而至者也温公逺齊先漢自誠實而充也人毋以嗜慾殺身貨財殺子孫政事殺人學術文章殺天下後世君子哉若人之言斯其為君子之樂也或問近世成人之道曰能行司馬公家教吕氏蒙訓亦可以為近世成人矣或問近世史學孰優曰通鑑歴代之綱目諸史之㑹要編年本春秋之意紀事槩之左氏之文秦漢以來作者弗可及矣不特優於近世而已也或問通鑑之起威烈何也曰平王東遷周於是興矣威烈壊禮東周益無復興之理春秋始於彼通鑑起於此温公襲夫子之意而不敢僣其文也曰何以辯其非僣也曰夫子嚴一字之褒貶温公述徃事以為勸戒也或問通鑑正朔以曹魏繼漢朱梁繼唐後周繼後漢何為而舍吳蜀晉陽北漢之正哉曰吳王孫權晉王克用始則無所受蜀主北漢主終則無所授始終無所授受者紀一國之事可也紀歴代之事不可也或問通鑑書詔令獨詳於先漢者何也曰以其近古也出於人君之口筆於人君之手如却馬詔賜南越書之類是也後世詔令皆代言者為之紛紛何足多述哉所以温公不屑禁林者不能强作不誠語也或問離騷上林通鑑何以不録曰無益於勸戒也凡無與於勸戒凡不足為大禍福者皆所不書此其為法班馬所不及也或曰通鑑亦有失歟曰通鑑非春秋烏得而無失魏伐吳蜀時謂之征吳蜀入魏晉陽入梁北漢入周時謂之寇何哉而謂之寇夷狄侵中國之謂也何哉而謂之征王命討不庭之謂也輕重失中是則温公因仍舊史之過也或曰紀傳之體與編年孰是曰文人愛竒則嗜紀傳史氏尚法則優編年必有作者知所先矣或曰編年優於紀傳春秋一字之法亦可效歟曰春秋不可僣也必如荀恱漢紀温公通鑑斯亦足矣或曰紀傳不及編年然則班馬皆非歟曰班馬未可全貶也文皆近古事皆見聞法皆家傳後世得之傳聞筆之衆手者又下於此矣苟不多愛容何傷於紀傳乎室堂之言門外不知比鄰所傳朝與夕異作史而有易心則見實聞不無失實唐無全史決擇知幾之法平易退之之文則全史矣歐宋惡其不全更而張之紀𫝊異趣工字斵語其為不全祗益甚耳或問范馬二公鍾律之辨曰帝王依人聲以制樂託樂噐以為音樂本傚人非人效樂為是言者知人聲之貴矣是故人禀中和之氣則有中和之聲人聲足以權量八音妙於聽聲者以心不以度君實以尺制律則失之矣景仁以律生尺然亦未為得也惟妙於聽聲本之人心参之人聲聲律相生樂在其中矣或問荀勗故法胡安定新制曰古者調律出於耳聽後世則據尺而為之適足易差晉志之言足以正荀勉之失聖人寓器以聲不先求其聲而更其器則不可徐復之言足以正胡氏之失二子之失皆泥於器數之過也景王無射也見非於伶州鳩梁武方夸其能吹笛合聲噐數豈必古皆是今皆非歟或問蘇劉郊祀分合之議曰隂陽天地之道也一陽生而祭天一隂生而祀地由古而然古者質勝文故郊禮一嵗而再舉不以為難後世文勝質故郊禮三年而合祭不以為易也或曰律䟽刑統防閑備矣何囹圄之不虚曰法以明民方施象刑屬民讀法是也今也條目浩繁儒生不能遽曉愚民則亦無責焉耳趙冬曦嘗以是為姦臣侮法之資非虛言矣或問譜牒崇冠冕之緒是耶非耶曰書稱别生分類周有小史辨世系欲人不亂昭穆婚姻之别也譜牒必以著姓為先者欲人毋忘其所自出也後世遂有寒門望族之辨因得以寘厚薄之論則未然矣或問律厯書志何先曰太史公為之祖蔡邕抑又次焉其餘則不知而作之者也或問一行兩戒山河之說曰即天官書所謂街北街南也即天下山川東北流其維首在隴蜀而尾入於渤碣之謂也不徒惟是諸史天文律厯皆推廣太史公之說云爾或問歴代厯法之異曰太初以律大衍以易其餘則增損故法復相非爾或曰孟子言千嵗之日可坐而致何後世厯法之屢更曰數往者易知來者難諸厯逆推上元則無爽傳之方來未有及百年者天動而數無窮餘分積乆則難計也或問大衍天地之數曰大衍包天地非天地生大衍也王弼嘗喻此理後人特未之詳爾或曰漢魏隋唐人主必集所為文者何也曰後世之君以馬上得之恥於文名之不彰也古者帝王言動則史必書言皆法言行皆德行是足以為文矣何必作為與文士爭一旦之名哉或曰子之所言書之末也本則奈何曰觀書如飲食在乎知味而已理解則說曰學識明矣道全則樂無入不自得焉未有本末不相為用而能進乎是也邇言卷十
